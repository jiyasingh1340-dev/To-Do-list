<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

   <div class="container">

    <h1>📝 Todo List</h1>

    <!-- Input Box -->
    <div class="input-box">

        <input
            type="text"
            id="taskInput"
            placeholder="Enter Task">

        <select id="priority">

            <option>High</option>
            <option>Medium</option>
            <option>Low</option>

        </select>

        <button onclick="addTodo()">Add Todo</button>

    </div>

    <!-- Counter -->
    <div class="task-counter">

        <p>📋 Total : <span id="totalTask"></span></p>

        <p>✅ Completed : <span id="completedTask"></span></p>

        <p>❌ Pending : <span id="pendingTask"></span></p>

    </div>

    <!-- Todos -->
    <div id="todoContainer"></div>

</div>

<script src="script.js"></script>

</body>

</html>
